<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ══ Favicon & PWA Icons ══ -->
    <!-- ICO: legacy IE/Edge & OS bookmark icons -->
    <link rel="shortcut icon" href="/favicon.ico" />
    <!-- SVG: modern browsers (Chrome, Firefox, Safari 15+) — scales perfectly at any DPR -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNG fallback at 32px for browsers that prefer PNG over SVG -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <!-- Apple touch icon — used when user adds to iOS Home Screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA manifest icons (192 + 512) -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E5A3A" />

    <!-- ══ SEO ══ -->
    <meta name="description" content="The Landlord Property — find, verify and buy below-market distress deals in Abuja, then earn as a managed shortlet. NIN/BVN KYC · AGIS title search · escrow-secured payments." />
    <meta name="keywords" content="Abuja property, shortlet, distress property, real estate Nigeria, verified property, escrow" />

    <!-- ══ Open Graph / Social ══ -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Landlord Property — Find · Verify · Buy · Earn, Abuja" />
    <meta property="og:description" content="Verified distress deals below market price + AI shortlet management. Abuja's smartest property platform." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- ══ Twitter Card ══ -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Landlord Property — Abuja" />
    <meta name="twitter:description" content="AI-powered property verification &amp; shortlet management across Abuja." />
    <meta name="twitter:image" content="/icon-512.png" />

    <title>The Landlord Property — Find · Verify · Buy · Earn, Abuja</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  </head>

  </body>
</html>
