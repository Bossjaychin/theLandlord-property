<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0C2B1F"/>

  <!-- Green C shape — thick arc open to the right -->
  <path
    d="M48,12
       C31,8 12,16 12,32
       C12,48 31,56 48,52
       L48,44
       C34,47 21,42 21,32
       C21,22 34,17 48,20
       Z"
    fill="#0E5A3A"
  />

  <!-- Gold house outline inside the C -->
  <!-- Roof -->
  <polyline
    points="24,34 32,24 40,34"
    fill="none"
    stroke="#C9A227"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- House body walls -->
  <polyline
    points="26.5,33 26.5,42 37.5,42 37.5,33"
    fill="none"
    stroke="#C9A227"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- 2×2 window grid -->
  <rect x="29.5" y="35.5" width="3.5" height="3" rx="0.5" fill="#C9A227"/>
  <rect x="34"   y="35.5" width="2"   height="3" rx="0.5" fill="#C9A227" opacity="0.6"/>
</svg>