# Create a standard property listing (no embedding)
mutation CreateProperty(
  $title: String!
  $nightlyRate: Float!
  $district: String!
  $isDistressSale: Boolean
  $agisVerified: Boolean
  $askingPrice: Float
) @auth(level: PUBLIC) {
  property_insert(data: {
    title: $title
    nightlyRate: $nightlyRate
    district: $district
    isDistressSale: $isDistressSale
    agisVerified: $agisVerified
    askingPrice: $askingPrice
  })
}

# Create a distress property listing WITH auto-generated Vertex AI embedding
# Used for semantic similarity search via MatchDistressProperties
mutation CreateDistressProperty(
  $title: String!
  $nightlyRate: Float!
  $district: String!
  $askingPrice: Float!
  $description: String!
) @auth(level: PUBLIC) {
  property_insert(data: {
    title: $title
    nightlyRate: $nightlyRate
    district: $district
    isDistressSale: true
    agisVerified: true
    askingPrice: $askingPrice
    # Auto-generate a 768-dim Vertex AI embedding for semantic matching
    descriptionEmbedding_embed: {
      model: "text-multilingual-embedding-002"
      text: $description
    }
  })
}

# Create a booking for a property
mutation CreateBooking(
  $propertyId: UUID!
  $checkIn: Date!
  $checkOut: Date!
) @auth(level: PUBLIC) {
  booking_insert(data: {
    propertyId: $propertyId
    checkIn: $checkIn
    checkOut: $checkOut
  })
}

# Create a marketplace property listing
mutation CreateMarketplaceProperty(
  $title: String!
  $type: String!
  $district: String!
  $price: Float!
  $titleDoc: String!
  $verified: Boolean!
  $size: String!
  $sqm: Int!
  $plots: Int
  $purpose: [String!]!
  $features: [String!]!
  $agent: String!
  $photos: Int!
  $description: String!
) @auth(level: PUBLIC) {
  property_insert(data: {
    title: $title
    nightlyRate: 0
    district: $district
    isDistressSale: false
    agisVerified: $verified
    askingPrice: $price
    type: $type
    titleDoc: $titleDoc
    size: $size
    sqm: $sqm
    plots: $plots
    purpose: $purpose
    features: $features
    agent: $agent
    photos: $photos
    description: $description
    isMarketplaceListing: true
  })
}
